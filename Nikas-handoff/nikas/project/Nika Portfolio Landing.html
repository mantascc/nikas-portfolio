  <link rel="stylesheet" href="tokens.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #e8e6df; font-family: 'JetBrains Mono', monospace; }

  <script type="text/babel" src="design-canvas.jsx"></script>

<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    function App() {
      return (
        <DesignCanvas>
          <DCSection id="portfolio" title="Nika Larsen — Portfolio Landing" subtitle="Three editorial directions · Clear Channel, light mode · aviation real-time data">
            <DCArtboard id="opt1" label="A · Logbook — editorial column, most restrained" width={880} height={2100} data-screen-label="Opt A · Logbook">

            </DCArtboard>
            <DCArtboard id="opt2" label="B · Flight Deck — split editorial + live dispatcher panel" width={1360} height={2100} data-screen-label="Opt B · Flight Deck">
              <Option2FlightDeck />
            </DCArtboard>
            <DCArtboard id="opt3" label="C · Sectional — chart-inspired waypoint plot (widest)" width={1360} height={2400} data-screen-label="Opt C · Sectional">
              <Option3Sectional />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
